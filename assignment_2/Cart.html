<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - LearnHub</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="navbar">
        <div class="logo">
            <span class="logo-icon">📖</span>
            <span class="logo-text">LearnHub</span>
        </div>
        <nav class="nav-links">
            <a href="#">All Courses</a>
            <a href="#">Search</a>
        </nav>
        <div class="nav-actions">
            <div class="cart-icon">🛒</div>
            <button class="signin-btn">Sign In</button>
        </div>
    </header>

    <main class="cart-container">
        <header class="cart-header">
            <h1>Shopping Cart</h1>
            <p>0 courses in your cart</p>
        </header>

        <section class="empty-cart-card">
            <div class="empty-state-content">
                <div class="cart-illustration">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#d1d5db" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="9" cy="21" r="1"></circle>
                        <circle cx="20" cy="21" r="1"></circle>
                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                    </svg>
                </div>
                <h2>Your cart is empty</h2>
                <p>Looks like you haven't added any courses yet. Start exploring!</p>
                <button class="browse-btn">Browse Courses</button>
            </div>
        </section>
    </main>

</body>
</html>
