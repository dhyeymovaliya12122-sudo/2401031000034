<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearnHub - Learn Without Limits</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="navbar">
        <div class="logo">
            <span class="logo-icon">📖</span>
            <span class="logo-text">LearnHub</span>
        </div>
        <nav class="nav-links">
            <a href="#">All Courses</a>
            <a href="#">Search</a>
        </nav>
        <div class="nav-actions">
            <div class="cart-icon">🛒</div>
            <button class="signin-btn">Sign In</button>
        </div>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>Learn Without Limits</h1>
            <p>Discover thousands of courses taught by industry experts. Start building your skills today.</p>
            <div class="hero-buttons">
                <button class="btn-primary">Explore Courses &rarr;</button>
                <button class="btn-secondary">Sign Up Free</button>
            </div>
        </div>
    </section>

    <section class="stats">
        <div class="stat-item">
            <h2>10M+</h2>
            <p>Learners</p>
        </div>
        <div class="stat-item">
            <h2>50K+</h2>
            <p>Courses</p>
        </div>
        <div class="stat-item">
            <h2>15K+</h2>
            <p>Instructors</p>
        </div>
        <div class="stat-item">
            <h2>95%</h2>
            <p>Success Rate</p>
        </div>
    </section>

</body>
</html>
